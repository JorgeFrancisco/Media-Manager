<!DOCTYPE html>
<html lang="pt-BR" th:lang="${#locale.toLanguageTag()}" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Nimbus File Manager</title>
	<link rel="icon" th:href="@{/favicon.ico}">
	<link rel="stylesheet" th:href="@{/css/base.css}">
	<link rel="stylesheet" th:href="@{/css/components.css}">
	<link rel="stylesheet" th:href="@{/css/pages/login.css}">
</head>
<body class="login-page">
<div class="login-shell">
	<form class="login-panel" th:action="@{/register}" method="post">
		<h1 class="title">Nimbus File Manager</h1>
		<p class="muted" th:text="#{register.title}">Criar conta</p>
		<span class="version-pill">v<span th:text="${appVersion}">0.0.0</span></span>
		<div class="alert error" th:if="${registerError}" th:text="${registerError}">Erro ao cadastrar.</div>
		<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
		<label><span th:text="#{common.email}">E-mail</span>
			<input name="email" type="email" autocomplete="username" th:value="${email}" autofocus>
		</label>
		<label class="section"><span th:text="#{common.name}">Nome</span>
			<input name="displayName" type="text" autocomplete="name" th:value="${displayName}">
		</label>
		<label class="section"><span th:text="#{common.password}">Senha</span>
			<input name="password" type="password" autocomplete="new-password">
		</label>
		<label class="section"><span th:text="#{register.confirmPassword}">Confirmar senha</span>
			<input name="confirmPassword" type="password" autocomplete="new-password">
		</label>
		<div class="actions">
			<button type="submit" th:text="#{register.submit}">Cadastrar</button>
			<a class="button secondary" th:href="@{/login}" th:text="#{action.back}">Voltar</a>
		</div>
	</form>
	<div class="login-art" aria-hidden="true"></div>
</div>
</body>
</html>
