<!DOCTYPE html>
<html lang="pt-BR" th:lang="${#locale.toLanguageTag()}" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title th:text="#{changePassword.title}">Trocar senha</title>
	<link rel="icon" th:href="@{/favicon.ico}">
	<link rel="stylesheet" th:href="@{/css/base.css}">
	<link rel="stylesheet" th:href="@{/css/components.css}">
	<link rel="stylesheet" th:href="@{/css/pages/login.css}">
</head>
<body class="login-page">
	<div class="login-shell">
		<form class="login-panel" th:action="@{/change-password}" method="post">
			<h1 class="title" th:text="#{changePassword.title}">Trocar senha</h1>
			<p class="muted" th:text="#{changePassword.subtitle}">Informe sua senha atual.</p>
			<span class="version-pill">v<span th:text="${appVersion}">0.0.0</span></span>
			<div class="alert error" th:if="${passwordError}" th:text="${passwordError}">Erro.</div>
			<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
			<label><span th:text="#{common.email}">E-mail</span>
				<input name="email" type="email" autocomplete="username" autofocus required>
			</label>
			<label class="section"><span th:text="#{changePassword.currentPassword}">Senha atual</span>
				<input name="currentPassword" type="password" autocomplete="current-password" required>
			</label>
			<label class="section"><span th:text="#{changePassword.newPassword}">Nova senha</span>
				<input name="newPassword" type="password" autocomplete="new-password" required>
			</label>
			<label class="section"><span th:text="#{changePassword.confirmNewPassword}">Confirmar nova senha</span>
				<input name="confirmPassword" type="password" autocomplete="new-password" required>
			</label>
			<div class="actions">
				<button type="submit" th:text="#{changePassword.submit}">Alterar</button>
				<a class="button secondary" th:href="@{/login}" th:text="#{action.back}">Voltar</a>
			</div>
		</form>
		<div class="login-art" aria-hidden="true"></div>
	</div>
</body>
</html>
