# Parallel test execution (JUnit 5 Platform), read automatically by Surefire and the IDE.
#
# Strategy chosen for safety: different test *classes* run concurrently, but the methods
# inside a single class stay on one thread. That keeps each class's own fixtures - @TempDir
# folders, per-class WORKSPACE dirs, shared mocks - single-threaded, so only genuinely
# independent classes ever overlap.
#
# Thread-based (not forked) parallelism: every test still runs in one JVM, so the single
# JaCoCo agent keeps aggregating coverage correctly and results stay reproducible.
#
# The 4 @SpringBootTest classes each spin up their own throwaway PostgreSQL container
# (Testcontainers + @ServiceConnection), so they are fully isolated and need no resource
# lock - they can run concurrently with each other and with the unit tests.
#
# Parallelism target: ~50% of the available cores (dynamic factor 0.5 -> cores * 0.5).
junit.jupiter.execution.parallel.enabled=true
junit.jupiter.execution.parallel.mode.default=same_thread
junit.jupiter.execution.parallel.mode.classes.default=concurrent
junit.jupiter.execution.parallel.config.strategy=dynamic
junit.jupiter.execution.parallel.config.dynamic.factor=0.5
