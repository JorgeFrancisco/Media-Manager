<!DOCTYPE html>
<html lang="pt-BR" th:lang="${#locale.toLanguageTag()}" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: common(#{page.welcome}, null)}"></head>
<body>
<div th:replace="~{fragments/layout :: app(~{::section}, #{page.welcome})}">
<section>
	<form class="panel" th:action="@{/app/onboarding}" method="post">
		<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
		<p class="muted" th:text="#{onboarding.prompt}">Qual pasta o Nimbus File Manager deve monitorar? A partir daqui ele acompanha essa
			pasta continuamente, cataloga o que encontrar, e nunca move nada sozinho.</p>
		<div class="alert error" th:if="${error}" th:text="${error}">Erro.</div>
		<label><span th:text="#{onboarding.folderToMonitor}">Pasta a monitorar</span>
			<span class="folder-field">
				<input name="sourcePath" id="onboardingSourcePath" th:value="${sourcePath}" placeholder="C:/nimbus-file-manager/workspace/temp" required readonly
						data-recent-values="onboarding-source">
				<button type="button" class="secondary folder-picker-open" data-target="#onboardingSourcePath"><i class="bi bi-folder2" aria-hidden="true"></i> <span th:text="#{quarantine.origin.chooseFolder}">Escolher pasta</span></button>
			</span>
		</label>
		<div class="checks">
			<label><input type="checkbox" name="recursive" th:checked="${recursive == null || recursive}"> <span th:text="#{organization.recursive}">Recursivo</span></label>
			<label><input type="checkbox" name="includeHidden" th:checked="${includeHidden}"> <span th:text="#{onboarding.includeHidden}">Ocultos</span></label>
			<label><input type="checkbox" name="calculateHashes" th:checked="${calculateHashes == null || calculateHashes}"> <span th:text="#{onboarding.hashes}">Hashes</span></label>
			<label><input type="checkbox" name="forceAnalysis" th:checked="${forceAnalysis}"> <span th:text="#{onboarding.forceAnalysis}">Forçar análise</span></label>
		</div>
		<div class="actions"><button type="submit" th:text="#{onboarding.start}">Começar a monitorar</button></div>
	</form>
	<p class="muted" th:text="#{onboarding.savedNote}">Essa escolha fica salva e pode ser revista em Configurações depois.</p>
	<div th:replace="~{fragments/folder-picker :: folderPicker}"></div>
</section>
</div>
</body>
</html>
