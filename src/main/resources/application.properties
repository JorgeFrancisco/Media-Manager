server.port=8088

spring.application.name=nimbus-file-manager
application.version=@project.version@

nimbus-file-manager.workspace=${NIMBUS_FILE_MANAGER_WORKSPACE:./workspace}
nimbus-file-manager.workspace-folders=database,logs,exports,temp,backup
nimbus-file-manager.default-layout=ANOMES_DIA_CATEGORIA_TIPO

spring.datasource.url=jdbc:postgresql://${NIMBUS_FILE_MANAGER_DB_HOST:localhost}:${NIMBUS_FILE_MANAGER_DB_PORT:5432}/${NIMBUS_FILE_MANAGER_DB_NAME:nimbus_file_manager}
spring.datasource.username=${NIMBUS_FILE_MANAGER_DB_USER:nimbus_file_manager}
spring.datasource.password=${NIMBUS_FILE_MANAGER_DB_PASSWORD:nimbus_file_manager}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jackson.serialization.indent-output=true

# Internationalization: UI text comes from messages*.properties (pt-BR default, en alternative).
# Never fall back to the server's OS locale; the app resolves the locale per user (see LocaleConfig).
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false

# Custom error page (templates/error.html). Never expose internals (message, stack
# trace, exception type, binding errors) to the browser.
server.error.whitelabel.enabled=false
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-exception=false
server.error.include-binding-errors=never

management.endpoints.web.exposure.include=health,info,metrics

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
# Dialect intentionally not set: Hibernate auto-selects PostgreSQLDialect from the
# connection (always PostgreSQL here). Setting it explicitly triggers HHH90000025.

# Batch tables come from the Flyway migration (V1__initial_schema.sql), not from Spring Boot's
# own initializer. Jobs are launched explicitly by InventoryBatchLauncherService, never
# auto-run at startup.
spring.batch.jdbc.initialize-schema=never
spring.batch.job.enabled=false

nimbus-file-manager.tools.ffprobe=${NIMBUS_FILE_MANAGER_FFPROBE:./tools/bin/ffprobe.exe}
nimbus-file-manager.tools.ffmpeg=${NIMBUS_FILE_MANAGER_FFMPEG:./tools/bin/ffmpeg.exe}
nimbus-file-manager.tools.exiftool=${NIMBUS_FILE_MANAGER_EXIFTOOL:./tools/bin/exiftool.exe}

nimbus-file-manager.inventory.progress-interval=100
# Seed value for the watch-recursive setting on a fresh DB (Settings owns it afterwards).
# Non-recursive by default: a recursive watch needs one native/inotify handle per subfolder,
# which does not scale to large trees (see docs/design-watcher-escala-e-reconcile.md). Enable
# with NIMBUS_FILE_MANAGER_WATCH_RECURSIVE=true only for small trees.
nimbus-file-manager.inventory.recursive-watch-default=${NIMBUS_FILE_MANAGER_WATCH_RECURSIVE:false}
# Full-tree reconcile cadence (ms). At large scale raise this (e.g. 900000 = 15 min) so the
# periodic disk scan is not a constant IO/CPU load. Default 5 min (300000).
nimbus-file-manager.inventory.reconciliation-interval-millis=${NIMBUS_FILE_MANAGER_RECONCILE_INTERVAL_MILLIS:300000}

# Central parallel processing (inventory metadata extraction). Conservative defaults;
# invalid/out-of-range values fall back to a clamped default with a WARN.
nimbus-file-manager.processing.workers=${NIMBUS_FILE_MANAGER_PROCESSING_WORKERS:4}
nimbus-file-manager.processing.queue-capacity=${NIMBUS_FILE_MANAGER_PROCESSING_QUEUE_CAPACITY:64}
nimbus-file-manager.processing.ffmpeg-photo-hash-limit=${NIMBUS_FILE_MANAGER_FFMPEG_PHOTO_HASH_LIMIT:4}
nimbus-file-manager.processing.ffprobe-video-limit=${NIMBUS_FILE_MANAGER_FFPROBE_VIDEO_LIMIT:2}

nimbus-file-manager.api.max-page-size=500
nimbus-file-manager.api.default-folder-limit=20
nimbus-file-manager.api.max-folder-limit=500

nimbus-file-manager.metadata.exiftool.enabled=true
nimbus-file-manager.metadata.mediainfo.enabled=true
nimbus-file-manager.metadata.ffprobe.enabled=true

nimbus-file-manager.duplicates.keep-strategy=OLDEST_MODIFIED

# Administrative-boundary dataset (offline Point-in-Polygon geolocation).
# The download URLs and the territory auto-completion live in app_setting
# (Settings screen, "Localização offline"), seeded with the official
# geoBoundaries defaults - nothing to edit here. Only the dev/test shortcut
# stays: a folder holding geoBoundariesCGAZ_ADM0/1/2.geojson used instead of
# downloading.
nimbus-file-manager.location.boundary.local-dir=${NIMBUS_FILE_MANAGER_BOUNDARY_LOCAL_DIR:}

nimbus-file-manager.security.default-username=${NIMBUS_FILE_MANAGER_ADMIN_USERNAME:admin@nimbus-file-manager.local}
nimbus-file-manager.security.default-password=${NIMBUS_FILE_MANAGER_ADMIN_PASSWORD:Mm#7Qv!9Lp$4Ks2}
nimbus-file-manager.security.google-login-enabled=${NIMBUS_FILE_MANAGER_GOOGLE_LOGIN_ENABLED:true}
nimbus-file-manager.security.idle-timeout-minutes=${NIMBUS_FILE_MANAGER_IDLE_TIMEOUT_MINUTES:5}
nimbus-file-manager.security.max-failed-login-attempts=${NIMBUS_FILE_MANAGER_MAX_FAILED_LOGIN_ATTEMPTS:5}
nimbus-file-manager.security.lockout-duration-minutes=${NIMBUS_FILE_MANAGER_LOCKOUT_DURATION_MINUTES:15}

# Email sending is opt-in and provider-based (see br.com.jorgemelo.nimbusfilemanager.notification).
# With nothing configured, EmailService falls back to just logging the confirmation link, so the
# app keeps working out of the box. Each provider owns its own property namespace on purpose (no
# shared spring.mail.* block) so adding a second SMTP-based provider later never collides with
# this one. To enable Gmail SMTP: set NIMBUS_FILE_MANAGER_EMAIL_GMAIL_ENABLED=true plus
# NIMBUS_FILE_MANAGER_SMTP_USERNAME/NIMBUS_FILE_MANAGER_SMTP_PASSWORD (a Google "App Password", not the
# account's regular password) as environment variables - never commit real values here.
nimbus-file-manager.email.gmail.enabled=${NIMBUS_FILE_MANAGER_EMAIL_GMAIL_ENABLED:false}
nimbus-file-manager.email.gmail.username=${NIMBUS_FILE_MANAGER_SMTP_USERNAME:}
nimbus-file-manager.email.gmail.password=${NIMBUS_FILE_MANAGER_SMTP_PASSWORD:}
