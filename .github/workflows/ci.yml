name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    # The 4 @SpringBootTest integration tests use Testcontainers to start a throwaway
    # PostgreSQL per test class, so no `services:` Postgres is needed - the ubuntu-latest
    # runner ships with Docker, which Testcontainers drives.

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up JDK 25
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: ./mvnw clean test
        run: |
          chmod +x mvnw
          ./mvnw -B clean test

      - name: Upload JaCoCo coverage report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 14

      - name: Upload surefire test reports (on failure)
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          retention-days: 14
