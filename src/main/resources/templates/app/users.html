<!DOCTYPE html>
<html lang="pt-BR" th:lang="${#locale.toLanguageTag()}" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: common(#{nav.users}, null)}"></head>
<body>
<div th:replace="~{fragments/layout :: app(~{::section}, #{nav.users})}">
<section>
	<div class="panel">
		<h2 th:text="#{users.new}">Novo usuário</h2>
		<div class="alert ok" th:if="${userCreated}" th:text="#{users.created}">Usuário cadastrado.</div>
		<div class="alert error" th:if="${userError}" th:text="${userError}">Erro.</div>
		<form th:action="@{/app/users}" method="post">
			<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
			<div class="form-grid">
				<label><span th:text="#{common.email}">E-mail</span>
					<input name="email" type="email" autocomplete="username" required>
				</label>
				<label><span th:text="#{common.name}">Nome</span>
					<input name="displayName" autocomplete="name">
				</label>
				<label><span th:text="#{users.initialPassword}">Senha inicial</span>
					<span class="input-with-action">
						<input name="password" id="newUserPassword" type="password" autocomplete="new-password" required>
						<button type="button" class="secondary" data-generate-password="newUserPassword" th:text="#{action.generate}">Gerar</button>
					</span>
				</label>
				<label><span th:text="#{users.role}">Perfil</span>
					<select name="role">
						<option th:each="role : ${roles}" th:value="${role}" th:text="${role}"></option>
					</select>
				</label>
			</div>
			<div class="actions">
				<button type="submit" th:text="#{register.submit}">Cadastrar</button>
			</div>
		</form>
	</div>
	<div class="panel section">
		<h2 th:text="#{users.registered}">Usuários cadastrados</h2>
		<form class="inline-form" th:action="@{/app/users}" method="get">
			<label><span th:text="#{common.search}">Pesquisar</span>
				<input name="q" th:value="${q}" th:placeholder="#{users.searchPlaceholder}" placeholder="E-mail ou nome">
			</label>
			<label><span th:text="#{common.show}">Exibir</span>
				<select name="size" onchange="this.form.submit()">
					<option th:each="option : ${sizes}" th:value="${option}" th:text="${option}"
							th:selected="${option == size}"></option>
				</select>
			</label>
			<button type="submit" th:text="#{action.search}">Buscar</button>
		</form>
		<div class="table-toolbar pagination-toolbar section" th:if="${usersPage.totalPages > 1}">
			<span class="muted" th:text="#{users.pageInfo(${usersPage.number + 1}, ${usersPage.totalPages}, ${usersPage.totalElements})}">Página</span>
			<nav class="pagination" th:aria-label="#{pagination.label}">
				<a class="button secondary small" th:if="${usersPage.hasPrevious()}" th:href="@{/app/users(q=${q},size=${size},page=0)}" th:text="#{pagination.first}">Primeira</a>
				<span class="button secondary small disabled" th:unless="${usersPage.hasPrevious()}" th:text="#{pagination.first}">Primeira</span>
				<a class="button secondary small" th:if="${usersPage.hasPrevious()}" th:href="@{/app/users(q=${q},size=${size},page=${usersPage.number - 1})}" th:text="#{pagination.previous}">Anterior</a>
				<span class="button secondary small disabled" th:unless="${usersPage.hasPrevious()}" th:text="#{pagination.previous}">Anterior</span>
				<a class="button secondary small" th:if="${usersPage.hasNext()}" th:href="@{/app/users(q=${q},size=${size},page=${usersPage.number + 1})}" th:text="#{pagination.next}">Próxima</a>
				<span class="button secondary small disabled" th:unless="${usersPage.hasNext()}" th:text="#{pagination.next}">Próxima</span>
				<a class="button secondary small" th:if="${usersPage.hasNext()}" th:href="@{/app/users(q=${q},size=${size},page=${usersPage.totalPages - 1})}" th:text="#{pagination.last}">Última</a>
				<span class="button secondary small disabled" th:unless="${usersPage.hasNext()}" th:text="#{pagination.last}">Última</span>
			</nav>
		</div>
		<div class="table-wrap">
			<table class="table">
				<thead><tr><th th:text="#{common.email}">E-mail</th><th th:text="#{common.name}">Nome</th><th th:text="#{users.role}">Perfil</th><th th:text="#{common.status}">Status</th><th th:text="#{users.twoFactor}">2FA</th><th th:text="#{users.lock}">Bloqueio</th></tr></thead>
				<tbody>
				<tr th:each="user : ${users}">
					<td th:text="${user.username}">admin@nimbus-file-manager.local</td>
					<td th:text="${user.displayName}">Admin</td>
					<td th:text="${user.role}">ADMIN</td>
					<td><span class="badge" th:classappend="${user.enabled ? 'ok' : 'warn'}" th:text="${user.enabled} ? #{users.enabled} : #{users.disabled}">Ativo</span></td>
					<td th:text="${user.twoFactorEnabled} ? #{users.enabled} : #{users.disabled}">Inativo</td>
					<td>
						<span class="badge warn" th:if="${user.currentlyLocked}" th:text="#{users.lockedUntil(${#temporals.format(user.lockedUntil, 'dd/MM HH:mm')})}">Até 10/07 12:00</span>
						<span th:unless="${user.currentlyLocked}">-</span>
					</td>
				</tr>
				<tr th:if="${#lists.isEmpty(users)}">
					<td colspan="6" th:text="#{users.empty}">Nenhum usuário encontrado.</td>
				</tr>
				</tbody>
			</table>
		</div>
	</div>
</section>
</div>
</body>
</html>
